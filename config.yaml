name: "ha-js-control"
description: "Write Home Assistant automations dynamically in JavaScript."
version: "0.0.3"
image: "ghcr.io/atraber/ha-js-control"
slug: "ha-js-control"
homeassistant_api: true
init: false
arch:
  - amd64
  - aarch64
map:
  - config:rw
options:
  automations_dir: "/config/js-automations"
schema:
  automations_dir: "str"
host_network: true
